name: Build & deploy demo

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Browsers for the recording.
      - run: pnpm exec playwright install --with-deps chromium

      # Run the story tests (records video + screenshot) and generate the
      # media-bundled HTML site into dist/.
      - run: pnpm run build

      # Deploy dist/ to Netlify. Add these as repo secrets:
      #   NETLIFY_AUTH_TOKEN  – a Netlify personal access token
      #   NETLIFY_SITE_ID     – the target site's API ID
      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: npx --yes netlify-cli deploy --dir=dist --site="$NETLIFY_SITE_ID" --prod --no-build
